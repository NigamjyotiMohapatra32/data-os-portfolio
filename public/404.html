<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data OS Portfolio</title>
  <!--
    GitHub Pages SPA redirect trick.
    When a user refreshes or deep-links to /data-os-portfolio/workspace,
    GH Pages serves this 404.html. We encode the full path into a query
    string and redirect to index.html, which reconstructs it before React Router boots.

    Segment count = 1 (the repo sub-directory: /data-os-portfolio)
  -->
  <script>
    var l = window.location;
    var segmentCount = 1;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>Redirecting…</body>
</html>
