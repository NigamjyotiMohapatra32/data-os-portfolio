<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Data OS Portfolio</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:grid;place-items:center;background:#06080f;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:14px}
    .container{text-align:center;padding:2rem;max-width:480px}
    .icon{font-size:4rem;margin-bottom:1.5rem;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    h1{font-size:1.5rem;color:#22d3ee;margin-bottom:.75rem;letter-spacing:-.02em}
    p{color:#64748b;line-height:1.7;margin-bottom:1.5rem}
    .status{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-radius:999px;border:1px solid rgba(244,114,182,.3);color:#f472b6;font-size:.75rem;margin-bottom:2rem}
    .dot{width:6px;height:6px;border-radius:50%;background:#f472b6;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    button{padding:.75rem 1.5rem;border-radius:10px;border:1px solid rgba(34,211,238,.4);background:rgba(34,211,238,.08);color:#22d3ee;cursor:pointer;font-family:inherit;font-size:.8rem;transition:all .2s}
    button:hover{background:rgba(34,211,238,.16);box-shadow:0 0 20px rgba(34,211,238,.3)}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔌</div>
    <div class="status"><span class="dot"></span> NETWORK_OFFLINE</div>
    <h1>Connection Lost</h1>
    <p>Data OS requires a network connection. Please check your internet and try again.</p>
    <button onclick="location.reload()">↻ Retry Connection</button>
  </div>
</body>
</html>
