name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write  # needed to push to gh-pages branch

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          # Sub-directory path on GitHub Pages (repo name as sub-path)
          BASE_PATH: /data-os-portfolio/
          # All VITE_* config is read from .env.production (committed).
          # Do NOT set VITE_* here from secrets: an unset secret becomes an
          # empty string which OVERRIDES .env.production values via Vite's
          # env-var precedence (process.env > .env.production).

      # Copy index.html → 404.html so the GH-Pages 404 handler is overridden
      # by our own SPA redirect (public/404.html was already copied by Vite)
      - name: Ensure .nojekyll (prevents Jekyll from mangling _assets)
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.sha }} — ${{ github.event.head_commit.message }}"
          force_orphan: true   # keeps gh-pages branch lean (single commit)
