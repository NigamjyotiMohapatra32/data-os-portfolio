name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write  # needed to push to gh-pages branch

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          # Sub-directory path on GitHub Pages (repo name as sub-path)
          BASE_PATH: /data-os-portfolio/
          # Firebase — use repo secrets (Settings → Secrets → Actions)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_PYTHON_API_URL: ${{ secrets.VITE_PYTHON_API_URL }}
          VITE_RESUME_URL: ${{ secrets.VITE_RESUME_URL }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          # Offline login gate (no backend on GH Pages) — sha256 hex of NODE_ID / PASSKEY
          VITE_DEV_AUTH_USER_HASH: ${{ secrets.VITE_DEV_AUTH_USER_HASH }}
          VITE_DEV_AUTH_PASSWORD_HASH: ${{ secrets.VITE_DEV_AUTH_PASSWORD_HASH }}

      # Copy index.html → 404.html so the GH-Pages 404 handler is overridden
      # by our own SPA redirect (public/404.html was already copied by Vite)
      - name: Ensure .nojekyll (prevents Jekyll from mangling _assets)
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.sha }} — ${{ github.event.head_commit.message }}"
          force_orphan: true   # keeps gh-pages branch lean (single commit)
