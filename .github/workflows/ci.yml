name: CI / CD — Data OS Portfolio

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Frontend: lint + build ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_PYTHON_API_URL: ${{ secrets.VITE_PYTHON_API_URL }}

      - name: Check bundle size
        run: |
          echo "=== Bundle sizes ==="
          du -sh dist/assets/*.js | sort -rh | head -15
          TOTAL=$(du -sh dist | cut -f1)
          echo "Total dist size: $TOTAL"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 3

  # ── 2. Python API: lint + test ────────────────────────────────────────────
  python-api:
    name: Python API (3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py && echo "✓ Syntax OK"

      - name: Import check
        run: python -c "from main import app, score_resume, format_sql_query, generate_ddl; print('✓ All imports OK')"

      - name: Smoke test — health endpoint
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          sleep 3
          curl -sf http://localhost:8001/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d; print('✓ Health OK')"
          kill %1

      - name: Unit test — resume scorer
        run: |
          python3 -c "
          from main import score_resume
          result = score_resume('5 years experience in SQL Server dimensional modeling star schema kimball SCD Type 2 Azure Data Factory Power BI', 'star schema sql server azure')
          assert result['ats_score'] > 0, 'ATS score should be > 0'
          assert result['job_match'] is not None, 'Job match should exist when JD provided'
          assert result['job_match']['score'] > 0, 'Job match score > 0'
          print(f'✓ Resume scorer: ATS={result[\"ats_score\"]}, JD match={result[\"job_match\"][\"score\"]}%')
          "

      - name: Unit test — SQL formatter
        run: |
          python3 -c "
          from main import format_sql_query
          result = format_sql_query('select id,name from users where id=1')
          assert 'SELECT' in result or 'select' in result, 'Should contain SELECT'
          print('✓ SQL formatter OK')
          "

      - name: Unit test — DDL generator
        run: |
          python3 -c "
          from main import generate_ddl
          entities = [{'name': 'dim_customer', 'attributes': [{'name': 'customer_sk', 'type': 'INT', 'isPrimary': True}, {'name': 'customer_name', 'type': 'VARCHAR'}]}]
          ddl = generate_ddl(entities, 'sqlserver')
          assert 'CREATE TABLE' in ddl
          assert 'dim_customer' in ddl
          assert 'PRIMARY KEY' in ddl
          print('✓ DDL generator OK')
          "

  # ── 3. Deploy to Netlify (master only) ────────────────────────────────────
  deploy:
    name: Deploy to Netlify
    needs: [frontend, python-api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_PYTHON_API_URL: ${{ secrets.VITE_PYTHON_API_URL }}
          VITE_RESUME_URL: ${{ secrets.VITE_RESUME_URL }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: dist
          production-branch: master
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }} — ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
